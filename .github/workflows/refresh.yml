name: Daily refresh

on:
  schedule:
    # 12:00 UTC daily (after FRED weekly drops Thursdays and after MND posts).
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  # Needed for the post-failure notifier step: it opens a GitHub issue when
  # a scheduled (cron) run fails, so a silent overnight break leaves a paper
  # trail in the repo issues tab instead of dying invisibly in the Actions log.
  issues: write

# Run JS-based actions on Node 24. Required from June 16, 2026; opting in early
# eliminates the Node 20 deprecation warning. https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Path used by every step to record per-component failures. Read by the summary step.
  FAIL_LOG: ${{ github.workspace }}/.refresh-failures.log

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Hard ceiling so a hung Playwright Chromium or wedged urllib socket
    # can't burn an entire 6-hour default budget — and quietly drain the
    # Actions monthly minutes allowance with it.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # Cache pip's wheel cache keyed on requirements.txt. When the file
          # hasn't changed (the common case for a daily cron), the install
          # step pulls wheels from cache instead of PyPI — ~15-25s saved per
          # run and one fewer external dependency to fail on.
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Init failure log
        run: |
          : > "$FAIL_LOG"

      - run: python -m pip install --upgrade pip

      - name: Install Python deps
        run: pip install -r requirements.txt || echo "pip-install failed" >> "$FAIL_LOG"

      # Playwright's Chromium binary is ~170 MB. Caching it keyed on
      # requirements.txt (which pins the Playwright version) skips the
      # full download/install on every run where the version hasn't moved —
      # typically saving ~45-60s. The "Install Playwright Chromium" step
      # below is then gated on a cache miss.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium || echo "playwright-install failed" >> "$FAIL_LOG"

      - name: Install Playwright OS deps (cache-hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        # When the browser binary itself is cached, we still need the
        # apt-level shared libs Chromium links against (libnss3, libxkbcommon0,
        # etc.) on a fresh runner — the binary alone isn't enough. This is
        # a no-op for the binary but ensures system libs are present.
        run: python -m playwright install-deps chromium || echo "playwright-deps failed" >> "$FAIL_LOG"

      - name: Discover active states
        id: states
        run: |
          set -e
          slugs=$(ls src/data/states 2>/dev/null | sort | tr '\n' ' ')
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"
          echo "Active states: $slugs"

      - name: Fetch FRED PMMS (national)
        env:
          # Optional but strongly recommended. When unset the script silently
          # skips the API tier and falls back to the (flaky) public CSV+HTML
          # endpoints. Register a free key at
          # https://fred.stlouisfed.org/docs/api/api_key.html and add as a
          # repo secret named FRED_API_KEY.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python scripts/fetch_fred.py || echo "fred" >> "$FAIL_LOG"

      - name: Fetch Rocket Mortgage (national)
        run: |
          python scripts/fetch_rocket.py || echo "rocket" >> "$FAIL_LOG"
          python scripts/aggregate_rocket.py || echo "aggregate-rocket" >> "$FAIL_LOG"

      - name: Fetch Bankrate live per state
        run: |
          for s in ${{ steps.states.outputs.slugs }}; do
            echo "::group::Bankrate $s"
            python scripts/fetch_bankrate_state.py --state "$s" || echo "bankrate:$s" >> "$FAIL_LOG"
            sleep 4
            echo "::endgroup::"
          done

      - name: Fetch MND live per state
        run: |
          for s in ${{ steps.states.outputs.slugs }}; do
            echo "::group::MND $s"
            python scripts/fetch_mnd_state.py --state "$s" || echo "mnd:$s" >> "$FAIL_LOG"
            sleep 2
            echo "::endgroup::"
          done

      - name: Fetch NerdWallet live per state
        run: |
          for s in ${{ steps.states.outputs.slugs }}; do
            echo "::group::NerdWallet $s"
            python scripts/fetch_nerdwallet_state.py --state "$s" || echo "nerdwallet:$s" >> "$FAIL_LOG"
            sleep 2
            echo "::endgroup::"
          done

      - name: Aggregate + reconcile per state
        run: |
          for s in ${{ steps.states.outputs.slugs }}; do
            echo "::group::Aggregate $s"
            python scripts/aggregate_mnd_state.py --state "$s" || echo "aggregate-mnd:$s" >> "$FAIL_LOG"
            python scripts/aggregate_nerdwallet_state.py --state "$s" || echo "aggregate-nerdwallet:$s" >> "$FAIL_LOG"
            python scripts/reconcile_state.py --state "$s" || echo "reconcile:$s" >> "$FAIL_LOG"
            python scripts/emit_daily_view.py --state "$s" || echo "daily-view:$s" >> "$FAIL_LOG"
            echo "::endgroup::"
          done

      - name: Build states index + sitemap
        run: |
          python scripts/build_states_index.py || echo "states-index" >> "$FAIL_LOG"
          python scripts/build_sitemap.py || echo "sitemap" >> "$FAIL_LOG"

      - name: Summarize partial failures
        if: always()
        run: |
          if [ -s "$FAIL_LOG" ]; then
            echo "::warning::Daily refresh had partial failures:"
            cat "$FAIL_LOG"
            echo ""
            echo "Count: $(wc -l < "$FAIL_LOG")"
          else
            echo "Daily refresh: no component-level failures."
          fi

      - name: Validate daily coverage
        if: always()
        env:
          # When set to "1" (e.g. via workflow_dispatch input later), the
          # validator fails the job if too many sources are missing or
          # stale. Default is permissive (warn-only) because partial coverage
          # is a normal outcome — one state's bot challenge shouldn't tank
          # the whole run. Threshold lives in STRICT_THRESHOLD below.
          STRICT_COVERAGE: ${{ vars.STRICT_COVERAGE || '0' }}
          STRICT_THRESHOLD: '20'   # percent of source-state cells allowed to be missing/stale
        run: |
          today=$(date -u +%Y-%m-%d)
          yesterday=$(date -u -d 'yesterday' +%Y-%m-%d)
          curr_month=$(date -u +%Y-%m)
          prev_month=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m)
          bk_missing=()
          bk_stale=()
          mnd_missing=()
          mnd_stale=()
          nw_missing=()
          nw_stale=()
          state_count=0
          # NerdWallet's per-state page exists for every state but the rate
          # widgets never populate for these. The fetcher exits 0 for them
          # (scripts/fetch_nerdwallet_state.py KNOWN_NO_COVERAGE) — keep this
          # list in sync so the validator stops warning about their old rows.
          NW_NO_COVERAGE=" nevada "
          # Bankrate returns HTTP 404 for these slugs (no per-state page
          # exists). The fetcher exits 0 for them
          # (scripts/fetch_bankrate_state.py KNOWN_NO_COVERAGE) — keep this
          # list in sync so the validator stops warning about the empty file.
          BANKRATE_NO_COVERAGE=" district-of-columbia "
          for s in ${{ steps.states.outputs.slugs }}; do
            state_count=$((state_count + 1))
            bf="src/data/states/$s/bankrate_30yr_daily.json"
            mf="src/data/states/$s/mnd_30yr_daily.json"
            # NerdWallet doesn't have a *_daily.json view (no daily-trail in
            # the chart); validate the JSONL accumulator's last row instead.
            nwf="data/daily/nerdwallet_$s.jsonl"
            if [[ "$BANKRATE_NO_COVERAGE" == *" $s "* ]]; then
              :
            elif [ -f "$bf" ]; then
              last=$(jq -r '.[-1].date // ""' "$bf" 2>/dev/null)
              if [ -z "$last" ]; then
                bk_missing+=("$s")
              elif [ "$last" != "$today" ] && [ "$last" != "$yesterday" ]; then
                bk_stale+=("$s=$last")
              fi
            else
              bk_missing+=("$s")
            fi
            if [ -f "$mf" ]; then
              last=$(jq -r '.[-1].date // ""' "$mf" 2>/dev/null)
              if [ -z "$last" ]; then
                mnd_missing+=("$s")
              elif [ "$last" != "$today" ] && [ "$last" != "$yesterday" ]; then
                mnd_stale+=("$s=$last")
              fi
            else
              mnd_missing+=("$s")
            fi
            if [ -f "$nwf" ]; then
              # Skip known-no-coverage states — their JSONL is a Wayback
              # backfill artifact, not something today's fetcher updates.
              if [[ "$NW_NO_COVERAGE" == *" $s "* ]]; then
                :
              else
                last=$(tail -1 "$nwf" | jq -r '.date_iso // ""' 2>/dev/null)
                if [ -z "$last" ]; then
                  nw_missing+=("$s")
                elif [ "$last" != "$today" ] && [ "$last" != "$yesterday" ]; then
                  nw_stale+=("$s=$last")
                fi
              fi
            else
              # No NW JSONL yet: tolerated for states where today's first
              # fetch hasn't written one.
              :
            fi
          done

          # ----- Per-source fetcher-failure count from FAIL_LOG -----
          # The fail log carries one line per failed component invocation:
          # `rocket`, `fred`, `bankrate:<slug>`, `mnd:<slug>`,
          # `nerdwallet:<slug>`, `aggregate-*`, etc. A non-zero count here
          # means *today's fetch step itself errored* — separate signal
          # from "the JSONL last row is yesterday" (which the file-mtime
          # checks above measure). The "Fetched today" column in the
          # summary uses these counts.
          rocket_failed_today=0
          fred_failed_today=0
          bk_failed_today=0
          mnd_failed_today=0
          nw_failed_today=0
          if [ -s "$FAIL_LOG" ]; then
            # grep -c always prints the count to stdout (even "0") and exits
            # 1 when no matches. `|| true` swallows the exit-1 without
            # appending a second "0" line to the captured value, which would
            # otherwise break the arithmetic substitutions below.
            rocket_failed_today=$(grep -c '^rocket$' "$FAIL_LOG" 2>/dev/null || true)
            fred_failed_today=$(grep -c '^fred$' "$FAIL_LOG" 2>/dev/null || true)
            bk_failed_today=$(grep -c '^bankrate:' "$FAIL_LOG" 2>/dev/null || true)
            mnd_failed_today=$(grep -c '^mnd:' "$FAIL_LOG" 2>/dev/null || true)
            nw_failed_today=$(grep -c '^nerdwallet:' "$FAIL_LOG" 2>/dev/null || true)
          fi
          bk_fetched_today=$((state_count - bk_failed_today))
          mnd_fetched_today=$((state_count - mnd_failed_today))
          nw_fetched_today=$((state_count - nw_failed_today))

          # Rocket is national (single JSONL, no per-state loop).
          rk_status="ok"
          rkf="data/daily/rocket.jsonl"
          if [ -f "$rkf" ]; then
            last=$(tail -1 "$rkf" | jq -r '.date_iso // ""' 2>/dev/null)
            if [ -z "$last" ]; then
              rk_status="missing (no rows)"
            elif [ "$last" != "$today" ] && [ "$last" != "$yesterday" ]; then
              rk_status="stale (last=$last)"
            fi
          else
            rk_status="missing (no file)"
          fi

          # PMMS (Freddie Mac Primary Mortgage Market Survey) is the national
          # monthly anchor for the chart. It's published weekly and aggregated
          # to a monthly mean. The newest .month entry should always be the
          # current calendar month (mid-month onward) or the previous one
          # (early in a new month before this week's PMMS lands).
          pmms_status_30="ok"
          pmms_status_15="ok"
          for term in 30 15; do
            pf="src/data/pmms_${term}yr_monthly.json"
            if [ -f "$pf" ]; then
              last=$(jq -r '.[-1].month // ""' "$pf" 2>/dev/null)
              if [ -z "$last" ]; then
                status_val="missing (no rows)"
              elif [ "$last" != "$curr_month" ] && [ "$last" != "$prev_month" ]; then
                status_val="stale (last=$last)"
              else
                status_val="ok"
              fi
            else
              status_val="missing (no file)"
            fi
            if [ "$term" = "30" ]; then pmms_status_30="$status_val"; else pmms_status_15="$status_val"; fi
          done

          ok=true
          if [ ${#bk_missing[@]} -gt 0 ]; then
            echo "::warning::Bankrate daily files missing/empty: ${bk_missing[*]}"
            ok=false
          fi
          if [ ${#bk_stale[@]} -gt 0 ]; then
            echo "::warning::Bankrate daily files stale (last row >1 day old): ${bk_stale[*]}"
            ok=false
          fi
          if [ ${#mnd_missing[@]} -gt 0 ]; then
            echo "::warning::MND daily files missing/empty: ${mnd_missing[*]}"
            ok=false
          fi
          if [ ${#mnd_stale[@]} -gt 0 ]; then
            echo "::warning::MND daily files stale (last row >1 day old): ${mnd_stale[*]}"
            ok=false
          fi
          if [ ${#nw_missing[@]} -gt 0 ]; then
            echo "::warning::NerdWallet JSONLs missing/empty (had row, now blank): ${nw_missing[*]}"
            ok=false
          fi
          if [ ${#nw_stale[@]} -gt 0 ]; then
            echo "::warning::NerdWallet JSONLs stale (last row >1 day old): ${nw_stale[*]}"
            ok=false
          fi
          if [ "$rk_status" != "ok" ]; then
            echo "::warning::Rocket Mortgage JSONL: $rk_status"
            ok=false
          fi
          if [ "$pmms_status_30" != "ok" ]; then
            echo "::warning::PMMS 30-yr monthly: $pmms_status_30"
            ok=false
          fi
          if [ "$pmms_status_15" != "ok" ]; then
            echo "::warning::PMMS 15-yr monthly: $pmms_status_15"
            ok=false
          fi
          # Loud signal for nationals when *today's* fetcher failed even
          # though the JSONL still has yesterday's row passing the staleness
          # rule. Without this the run page reports "Rocket ok" while
          # tomorrow's run will find the same row stale. Same logic for
          # FRED — a missed weekly drop today doesn't immediately show in
          # the monthly file if the prior week already landed.
          if [ "$rocket_failed_today" -gt 0 ]; then
            echo "::warning::Rocket Mortgage fetcher failed today (JSONL last row=$rk_status); next run will mark it stale"
            ok=false
          fi
          if [ "$fred_failed_today" -gt 0 ]; then
            echo "::warning::FRED PMMS fetcher failed today (PMMS 30=$pmms_status_30 / 15=$pmms_status_15)"
            ok=false
          fi
          if $ok; then
            echo "Daily coverage check passed: every tracked source has a recent row."
          fi

          # ----- $GITHUB_STEP_SUMMARY markdown table -----
          # Surfaces the run's coverage health on the workflow run page (not
          # buried in step logs). Counts per source come straight from the
          # arrays above; PMMS is one row each because it's national-monthly.
          bk_m=${#bk_missing[@]}; bk_s=${#bk_stale[@]}
          mnd_m=${#mnd_missing[@]}; mnd_s=${#mnd_stale[@]}
          nw_m=${#nw_missing[@]};  nw_s=${#nw_stale[@]}
          {
            echo "## Daily refresh — coverage summary"
            echo ""
            echo "**Date (UTC):** $today"
            echo "**Tracked states:** $state_count"
            if [ -s "$FAIL_LOG" ]; then
              echo "**Component failures:** $(wc -l < "$FAIL_LOG") (see workflow log for detail)"
            else
              echo "**Component failures:** 0"
            fi
            echo ""
            # "Fetched today" — what *today's* fetcher step actually
            # accomplished. Distinct from the on-disk staleness columns
            # which can pass on yesterday's row even when today's fetcher
            # failed outright.
            rk_today=$( [ "$rocket_failed_today" -eq 0 ] && echo "yes" || echo "NO" )
            fred_today=$( [ "$fred_failed_today" -eq 0 ] && echo "yes" || echo "NO" )
            echo "| Source | Scope | Fetched today | Missing | Stale (>1d) | Status |"
            echo "|---|---|:--:|---:|---:|---|"
            echo "| Bankrate | per state | $bk_fetched_today/$state_count | $bk_m | $bk_s | $( [ $bk_m -eq 0 ] && [ $bk_s -eq 0 ] && echo OK || echo WARN ) |"
            echo "| MND | per state | $mnd_fetched_today/$state_count | $mnd_m | $mnd_s | $( [ $mnd_m -eq 0 ] && [ $mnd_s -eq 0 ] && echo OK || echo WARN ) |"
            echo "| NerdWallet | per state | $nw_fetched_today/$state_count | $nw_m | $nw_s | $( [ $nw_m -eq 0 ] && [ $nw_s -eq 0 ] && echo OK || echo WARN ) |"
            echo "| Rocket | national | $rk_today | - | - | $rk_status |"
            echo "| PMMS 30-yr | national-monthly | $fred_today | - | - | $pmms_status_30 |"
            echo "| PMMS 15-yr | national-monthly | $fred_today | - | - | $pmms_status_15 |"
            echo ""
            if [ $bk_m -gt 0 ] || [ $bk_s -gt 0 ]; then
              echo "**Bankrate problem states:** ${bk_missing[*]} ${bk_stale[*]}"
            fi
            if [ $mnd_m -gt 0 ] || [ $mnd_s -gt 0 ]; then
              echo "**MND problem states:** ${mnd_missing[*]} ${mnd_stale[*]}"
            fi
            if [ $nw_m -gt 0 ] || [ $nw_s -gt 0 ]; then
              echo "**NerdWallet problem states:** ${nw_missing[*]} ${nw_stale[*]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # ----- STRICT_COVERAGE gate -----
          # Total "cells" we track = 3 sources × N states + 3 nationals (rocket
          # + 2 PMMS terms). If the share of broken cells exceeds the
          # threshold and STRICT_COVERAGE=1, fail the job — partial failures
          # below threshold stay warnings so a single flaky state isn't fatal.
          if [ "$STRICT_COVERAGE" = "1" ]; then
            per_state_cells=$((state_count * 3))
            total_cells=$((per_state_cells + 3))
            broken=$((bk_m + bk_s + mnd_m + mnd_s + nw_m + nw_s))
            [ "$rk_status" != "ok" ] && broken=$((broken + 1))
            [ "$pmms_status_30" != "ok" ] && broken=$((broken + 1))
            [ "$pmms_status_15" != "ok" ] && broken=$((broken + 1))
            # National-fetcher-failed-today is its own breakage, regardless
            # of JSONL staleness — count it so a 100% blocked Rocket day
            # actually counts toward the threshold instead of getting
            # absorbed by yesterday's row passing the recency check.
            [ "$rocket_failed_today" -gt 0 ] && [ "$rk_status" = "ok" ] && broken=$((broken + 1))
            [ "$fred_failed_today" -gt 0 ] && [ "$pmms_status_30" = "ok" ] && broken=$((broken + 1))
            if [ "$total_cells" -gt 0 ]; then
              pct=$(( broken * 100 / total_cells ))
              echo "STRICT_COVERAGE: $broken / $total_cells cells broken ($pct%); threshold $STRICT_THRESHOLD%"
              if [ "$pct" -gt "$STRICT_THRESHOLD" ]; then
                echo "::error::Coverage failure rate $pct% exceeds threshold $STRICT_THRESHOLD% (STRICT_COVERAGE=1)"
                exit 1
              fi
            fi
          fi

      - name: Commit refreshed data
        id: commit
        env:
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: |
          set -e
          git add data/daily src/data public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No data changes today."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          fail_summary=""
          if [ -s "$FAIL_LOG" ]; then
            fail_summary=" (partial: $(wc -l < "$FAIL_LOG") failure(s))"
          fi
          git commit -m "auto: refresh data $(date -u +%Y-%m-%d)${fail_summary}"
          # Push with pull-rebase retry to survive races where another commit
          # lands on main during the ~25min refresh window.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $i"
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push attempt $i failed; rebasing on origin/main and retrying"
            git pull --rebase origin main || true
            sleep $((i * 4))
          done
          echo "Push failed after 5 attempts"
          exit 1

      # GitHub's GITHUB_TOKEN intentionally does NOT fire downstream workflows
      # on the `push` event triggered by its own commits — a security feature
      # to prevent infinite workflow loops. That means our auto-refresh pushes
      # never trigger deploy.yml, so GH Pages keeps serving the bundle built
      # at the last *human* push. The page's bundled JSON data layers (PMMS
      # weekly, NW daily, etc. — all eager-imported via Vite's import.meta.glob)
      # therefore go stale on the live site even though origin/main has fresh
      # data. workflow_dispatch IS allowed via GITHUB_TOKEN, so explicitly
      # triggering the deploy after a successful data push fixes that.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main

      # Opens a GitHub issue when a *scheduled* (cron) run fails. Manual
      # (workflow_dispatch) runs are exempt because the human invoker is
      # already watching the logs. De-duplicated by title — if a refresh-
      # failed issue from a previous day is still open, append a comment
      # instead of opening a duplicate. This makes overnight failures
      # visible in the repo's Issues tab instead of dying silently.
      - name: Notify on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Daily refresh failed (${today})`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Scheduled daily refresh failed.`,
              ``,
              `- **Run:** ${runUrl}`,
              `- **Triggered by:** ${context.eventName}`,
              `- **SHA:** ${context.sha}`,
              ``,
              `Check the run's "Validate daily coverage" step summary for the per-source breakdown.`,
              `If this is intermittent (transient HTTP / bot challenge), close this issue once the next run is green.`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-refresh-failure',
              per_page: 50,
            });
            const dup = existing.data.find(i => i.title.startsWith('Daily refresh failed'));
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `Another failure: ${runUrl}`,
              });
              core.info(`Appended comment to existing issue #${dup.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['daily-refresh-failure', 'automation'],
              });
              core.info(`Opened issue #${created.data.number}`);
            }
