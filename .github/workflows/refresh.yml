name: Daily refresh

on:
  schedule:
    # 12:00 UTC daily (after FRED weekly drops Thursdays and after MND posts).
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Run JS-based actions on Node 24. Required from June 16, 2026; opting in early
# eliminates the Node 20 deprecation warning. https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Discover active states
        id: states
        run: |
          set -e
          slugs=$(ls src/data/states 2>/dev/null | sort | tr '\n' ' ')
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"
          echo "Active states: $slugs"

      - name: Fetch FRED PMMS (national)
        run: python scripts/fetch_fred.py

      - name: Fetch Bankrate live per state
        run: |
          set -e
          for s in ${{ steps.states.outputs.slugs }}; do
            echo "::group::Bankrate $s"
            python scripts/fetch_bankrate_state.py --state "$s" || echo "Bankrate $s failed (continuing)"
            sleep 4
            echo "::endgroup::"
          done

      - name: Fetch MND live per state
        run: |
          set -e
          for s in ${{ steps.states.outputs.slugs }}; do
            echo "::group::MND $s"
            python scripts/fetch_mnd_state.py --state "$s" || echo "MND $s failed (continuing)"
            sleep 2
            echo "::endgroup::"
          done

      - name: Aggregate + reconcile per state
        run: |
          set -e
          for s in ${{ steps.states.outputs.slugs }}; do
            python scripts/aggregate_mnd_state.py --state "$s"
            python scripts/reconcile_state.py --state "$s"
          done

      - name: Build states index + sitemap
        run: |
          python scripts/build_states_index.py
          python scripts/build_sitemap.py

      - name: Commit refreshed data
        env:
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: |
          set -e
          git add data/daily src/data public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No data changes today."
            exit 0
          fi
          git commit -m "auto: refresh data $(date -u +%Y-%m-%d)"
          git push
