name: Daily refresh

on:
  schedule:
    # 12:00 UTC daily (~8 AM ET) — after FRED weekly drops on Thursdays and after
    # MND posts its day-open value.
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip

      - run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Fetch FRED PMMS
        run: python scripts/fetch_fred.py

      - name: Fetch Bankrate NC (headless browser)
        run: python scripts/fetch_bankrate_nc_browser.py
        continue-on-error: true

      - name: Fetch MND NC (today)
        run: python scripts/fetch_mnd_nc.py
        continue-on-error: true

      - name: Aggregate MND monthly
        run: python scripts/aggregate_mnd_monthly.py

      - name: Reconcile NC monthly
        run: python scripts/reconcile_nc.py

      - name: Commit refreshed data
        env:
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: |
          set -e
          git add data/daily src/data
          if git diff --cached --quiet; then
            echo "No data changes today."
            exit 0
          fi
          git commit -m "auto: refresh data $(date -u +%Y-%m-%d)"
          git push
